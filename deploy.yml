- name: Деплой Redmine на серверы
  hosts: all
  gather_facts: yes
  become: yes

  vars:
    container_name: redmine
    redmine_image: redmine:latest

  tasks:
    - name: Остановить и удалить существующий контейнер (если есть)
      shell: |
        docker stop {{ container_name }} || true
        docker rm {{ container_name }} || true
      ignore_errors: yes

    - name: Запустить Redmine контейнер с подключением к БД
      shell: |
        docker run -d \
          --name {{ container_name }} \
          --restart always \
          -p {{ redmine_port }}:3000 \
          -e REDMINE_DB_POSTGRES={{ redmine_db_host }} \
          -e REDMINE_DB_PORT={{ redmine_db_port }} \
          -e REDMINE_DB_DATABASE={{ redmine_db_name }} \
          -e REDMINE_DB_USERNAME={{ redmine_db_user }} \
          -e REDMINE_DB_PASSWORD='{{ redmine_db_password }}' \
          {{ redmine_image }}
      register: result
      changed_when: result.rc == 0

    - name: Ожидание запуска Redmine
      shell: |
        for i in $(seq 1 60); do
          if curl -s -o /dev/null -w "%{http_code}" http://localhost:{{ redmine_port }} | grep -q "200"; then
            echo "Redmine is ready"
            exit 0
          fi
          sleep 2
        done
        echo "Redmine did not start in time"
        exit 1
      register: health_check
      changed_when: false

    - name: Вывести статус
      debug:
        msg: "Redmine на {{ inventory_hostname }} успешно запущен"